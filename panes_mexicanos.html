<!DOCTYPE html>

<head>

</head>

<div class="contenedor">

    <section class="catalogo">
        <div class="producto">
            <img src="images/mexicanos/beso.jpg" alt="Besos">

                <h3>Besos</h3>

        <div class="producto">
            <img src="images/mexicanos/picones.jpg" alt="Picones">
