<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panes Italianos - Douceur de Blè</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="contenedor">
    <header class="header">
        <h1>Panes Italianos</h1>
    </header>
    <section class="catalogo">
        <div class="producto">
            <img src="images/ciabatta.jpg" alt="Ciabatta">
            <div class="producto-info">
                <h3>Ciabatta</h3>
                <p>Precio: $55 MXN</p>
                <button class="btn" onclick="alert('¡Ciabatta añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/focaccia.jpg" alt="Focaccia">
            <div class="producto-info">
                <h3>Focaccia</h3>
                <p>Precio: $50 MXN</p>
                <button class="btn" onclick="alert('¡Focaccia añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/pane_di_altamura.jpg" alt="Pane di Altamura">
            <div class="producto-info">
                <h3>Pane di Altamura</h3>
                <p>Precio: $60 MXN</p>
                <button class="btn" onclick="alert('¡Pane di Altamura añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/grissini.jpg" alt="Grissini">
            <div class="producto-info">
                <h3>Grissini</h3>
                <p>Precio: $35 MXN</p>
                <button class="btn" onclick="alert('¡Grissini añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/pane_toscano.jpg" alt="Pane Toscano">
            <div class="producto-info">
                <h3>Pane Toscano</h3>
                <p>Precio: $65 MXN</p>
                <button class="btn" onclick="alert('¡Pane Toscano añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/piadina.jpg" alt="Piadina">
            <div class="producto-info">
                <h3>Piadina</h3>
                <p>Precio: $40 MXN</p>
                <button class="btn" onclick="alert('¡Piadina añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
        <div class="producto">
            <img src="images/pandoro.jpg" alt="Pandoro">
            <div class="producto-info">
                <h3>Pandoro</h3>
                <p>Precio: $75 MXN</p>
                <button class="btn" onclick="alert('¡Pandoro añadido al carrito!')">Agregar al carrito</button>
            </div>
        </div>
    </section>
    <footer class="footer">
        <p>&copy; 2025 Douceur de Blè. Todos los derechos reservados.</p>
    </footer>
</div>
</body>
</html>
